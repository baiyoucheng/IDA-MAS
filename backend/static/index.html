<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDA-MAS — 智能文档分析系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- ============================================================ -->
    <!-- Header                                                       -->
    <!-- ============================================================ -->
    <header class="header">
        <div class="header-inner">
            <h1 class="header-title">
                <span class="logo">&#9670;</span> IDA-MAS
            </h1>
            <span class="header-subtitle">Intelligent Document Analysis</span>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- Main Layout: Sidebar + Chat Area                             -->
    <!-- ============================================================ -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Upload Section -->
            <section class="sidebar-section">
                <h2 class="section-title">上传文档</h2>
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">&#8613;</div>
                    <p class="upload-text">拖拽文件到此处，或点击上传</p>
                    <p class="upload-hint">支持 PDF / DOCX / TXT，最大 10MB</p>
                    <input type="file" id="fileInput" accept=".pdf,.docx,.txt" hidden>
                    <button class="btn btn-primary" id="uploadBtn">选择文件</button>
                </div>
                <div class="upload-status" id="uploadStatus"></div>
            </section>

            <!-- Document List -->
            <section class="sidebar-section">
                <h2 class="section-title">已上传文档</h2>
                <div class="doc-list" id="docList">
                    <p class="empty-hint">暂无文档</p>
                </div>
            </section>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <div class="welcome-icon">&#9670;</div>
                    <h3>欢迎使用 IDA-MAS</h3>
                    <p>上传文档后，即可向我提问。我会基于文档内容给出精准回答。</p>
                    <div class="sample-questions">
                        <p class="sample-label">试试这些问题：</p>
                        <button class="sample-btn" data-question="保险理赔需要提供哪些材料？">保险理赔需要提供哪些材料？</button>
                        <button class="sample-btn" data-question="互联网贷款的授信额度上限是多少？">互联网贷款的授信额度上限是多少？</button>
                        <button class="sample-btn" data-question="保险合同中的等待期是多久？">保险合同中的等待期是多久？</button>
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div class="chat-input-area">
                <textarea
                    class="chat-input"
                    id="chatInput"
                    placeholder="输入你的问题… (Enter 发送，Shift+Enter 换行)"
                    rows="2"
                ></textarea>
                <button class="btn btn-send" id="sendBtn" title="发送">
                    &#8593;
                </button>
            </div>
        </main>
    </div>

    <!-- ============================================================ -->
    <!-- Toast Container                                              -->
    <!-- ============================================================ -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/app.js"></script>
</body>
</html>
